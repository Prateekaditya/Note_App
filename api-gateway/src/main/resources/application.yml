server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service-login
          uri: lb://user-service
          predicates:
            - Path=/api/users/login, /api/users/register
          filters:
            - RewritePath=/api/users/(?<segment>.*), /${segment}

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /${segment}
            - JwtAuthenticationFilter

        - id: note-service
          uri: lb://note-service
          predicates:
            - Path=/api/notes/**
          filters:
            - RewritePath=/api/notes/(?<segment>.*), /${segment}
            - JwtAuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

